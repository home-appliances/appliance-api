name: Renew SSL Certificate

on:
  schedule:
    # 每 60 天运行一次（每月 1 号和 31 号）
    - cron: '0 2 1,31 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Install acme.sh
        run: curl https://get.acme.sh | sh -s email=admin@cheapgo.top

      - name: Install aliyun CLI
        run: |
          curl -fsSL "https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz" -o aliyun-cli.tgz
          tar xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/
          aliyun version

      - name: Configure Aliyun CLI
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          aliyun configure set \
            --mode AK \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET" \
            --region "cn-shenzhen"

      - name: Configure acme.sh DNS API
        env:
          Ali_Key: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          Ali_Secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          echo "Ali_Key=$Ali_Key" >> ~/.acme.sh/account.conf
          echo "Ali_Secret=$Ali_Secret" >> ~/.acme.sh/account.conf

      - name: Issue/ Renew Certificate
        run: |
          ~/.acme.sh/acme.sh --issue \
            -d appliance-api.cheapgo.top \
            --dns dns_ali \
            --force

      - name: Upload Certificate to FC
        run: |
          # 读取证书文件（转义换行符为 \\n）
          CERT=$(cat ~/.acme.sh/appliance-api.cheapgo.top_ecc/appliance-api.cheapgo.top.cer | sed ':a;N;$!ba;s/\n/\\n/g')
          KEY=$(cat ~/.acme.sh/appliance-api.cheapgo.top_ecc/appliance-api.cheapgo.top.key | sed ':a;N;$!ba;s/\n/\\n/g')

          # 用 aliyun CLI 上传证书到 FC
          aliyun fc PUT /2023-03-30/custom-domains/appliance-api.cheapgo.top --body "{
            \"protocol\": \"HTTP,HTTPS\",
            \"routeConfig\": {
              \"routes\": [{
                \"path\": \"/*\",
                \"functionName\": \"api\",
                \"qualifier\": \"LATEST\"
              }]
            },
            \"certConfig\": {
              \"certType\": \"upload\",
              \"certificate\": \"$CERT\",
              \"privateKey\": \"$KEY\"
            }
          }"

      - name: Verify HTTPS
        run: |
          sleep 10
          curl -sI https://appliance-api.cheapgo.top | head -5
