name: Deploy to FC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure credentials
        run: s config add --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -a default -f

      - name: Deploy to FC
        env:
          DB_HOST: pgm-wz97275grs6n7622.rwlb.rds.aliyuncs.com
          DB_NAME: appliance_db
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: "5432"
          DB_USER: Aa_123
        run: s deploy -y --use-local
