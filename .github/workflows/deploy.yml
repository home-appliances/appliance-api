name: Deploy to FC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          rm -rf dist/ tsconfig.tsbuildinfo
          npm ci
          npm run build
          # 创建 dist/package.json（不含 type:module，FC 用 require() 加载）
          node -e "
          const pkg = require('./package.json');
          const distPkg = { name: pkg.name, version: pkg.version, main: 'index.js', dependencies: pkg.dependencies || {} };
          require('fs').writeFileSync('dist/package.json', JSON.stringify(distPkg, null, 2));
          "
          cp package-lock.json dist/
          cd dist && npm install --omit=dev && cd ..
          echo "=== VERIFY ==="
          ls dist/node_modules/hono/package.json && echo "✅ hono exists"
          cat dist/package.json
          du -sh dist/
          echo "=== FILES ==="
          ls dist/*.js

      - name: Package code.zip
        run: |
          cd dist && zip -r ../code.zip . && cd ..
          echo "=== ZIP FILE ==="
          ls -la code.zip
          echo "=== ZIP SIZE ==="
          du -sh code.zip
          echo "=== ZIP TOP FILES ==="
          unzip -l code.zip | grep -E "fc-handler|index\.js" | head -5
          echo "=== ZIP VERIFY ==="
          test -f code.zip && echo "✅ code.zip exists" || echo "❌ code.zip missing!"

      - name: Deploy to FC via API
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        run: |
          echo "=== DEPLOYING VIA FC API ==="
          npm install @alicloud/fc2 --save
          node -e "
          const FC = require('@alicloud/fc2');
          const fs = require('fs');
          const path = require('path');

          const client = new FC({
            accessKeyID: process.env.ALIYUN_ACCESS_KEY_ID,
            accessKeySecret: process.env.ALIYUN_ACCESS_KEY_SECRET,
            region: 'cn-shenzhen',
            accountId: process.env.ALIYUN_ACCOUNT_ID,
          });

          async function deploy() {
            try {
              console.log('Uploading code.zip...');
              const code = fs.readFileSync('code.zip');
              await client.updateFunctionCode('appliance-service', 'applican', {
                zipBuffer: code,
              });
              console.log('✅ Code uploaded successfully!');

              console.log('Updating function config...');
              await client.updateFunctionConfig('appliance-service', 'applican', {
                handler: 'fc-handler.handler',
                timeout: 60,
                memorySize: 512,
                environmentVariables: {
                  DB_HOST: 'pgm-wz97275grs6n7622.rwlb.rds.aliyuncs.com',
                  DB_NAME: 'appliance_db',
                  DB_PASSWORD: 'Aa_123789',
                  DB_PORT: '5432',
                  DB_USER: 'Aa_123',
                  NODE_ENV: 'production',
                  TZ: 'Asia/Shanghai',
                },
              });
              console.log('✅ Config updated successfully!');
              console.log('Handler: fc-handler.handler');
            } catch (err) {
              console.error('❌ Deploy failed:', err.message);
              process.exit(1);
            }
          }
          deploy();
          "
          echo "=== TEST ==="
          sleep 10
          curl -s https://fc.cheapgo.top/ || echo "curl failed"
