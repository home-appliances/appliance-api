name: Deploy to FC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          rm -rf dist/ tsconfig.tsbuildinfo
          npm ci
          npm run build
          # 创建 dist/package.json（不含 type:module，FC 用 require() 加载）
          node -e "
          const pkg = require('./package.json');
          const distPkg = { name: pkg.name, version: pkg.version, main: 'index.js', dependencies: pkg.dependencies || {} };
          require('fs').writeFileSync('dist/package.json', JSON.stringify(distPkg, null, 2));
          "
          cp package-lock.json dist/
          cd dist && npm install --omit=dev && cd ..
          echo "=== VERIFY ==="
          ls dist/node_modules/hono/package.json && echo "✅ hono exists"
          cat dist/package.json
          du -sh dist/
          echo "=== FILES ==="
          ls dist/*.js

      - name: Package code.zip
        run: |
          cd dist && zip -r ../code.zip . && cd ..
          echo "=== ZIP FILE ==="
          ls -la code.zip
          echo "=== ZIP SIZE ==="
          du -sh code.zip
          echo "=== ZIP TOP FILES ==="
          unzip -l code.zip | grep -E "fc-handler|index\.js" | head -5
          echo "=== ZIP VERIFY ==="
          test -f code.zip && echo "✅ code.zip exists" || echo "❌ code.zip missing!"

      - name: Install Serverless Devs
        run: npm install @serverless-devs/s -g

      - name: Configure credentials
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        run: |
          s config add \
            --AccountID "$ALIYUN_ACCOUNT_ID" \
            --AccessKeyID "$ALIYUN_ACCESS_KEY_ID" \
            --AccessKeySecret "$ALIYUN_ACCESS_KEY_SECRET" \
            -a default

      - name: Deploy to FC
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        run: |
          echo "=== PRE-DEPLOY CHECK ==="
          test -f code.zip && echo "✅ code.zip exists ($(du -sh code.zip | cut -f1))" || echo "❌ code.zip missing!"
          echo "=== DEPLOY ==="
          s deploy -y
          echo "=== DEPLOY EXIT CODE: $? ==="
          echo "=== WAITING FOR FC UPDATE ==="
          sleep 15
          echo "=== TEST ==="
          RESULT=$(curl -s https://fc.cheapgo.top/ 2>&1)
          echo "$RESULT"
          echo "$RESULT" | grep -q "version" && echo "✅ NEW CODE DEPLOYED" || echo "⚠️ OLD CODE STILL RUNNING"
