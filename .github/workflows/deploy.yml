name: Deploy to FC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package code.zip
        run: |
          rm -rf deploy/ && mkdir deploy/
          cp -r dist/* deploy/
          cp -r src deploy/src
          mkdir -p deploy/db
          cp src/db/*.sql deploy/db/
          node -e "
          const pkg = require('./package.json');
          const distPkg = { name: pkg.name, version: pkg.version, main: 'index.js', dependencies: pkg.dependencies || {} };
          require('fs').writeFileSync('deploy/package.json', JSON.stringify(distPkg, null, 2));
          "
          cp package-lock.json deploy/
          cd deploy && npm install --omit=dev && cd ..
          cd deploy && zip -r ../code.zip . && cd ..

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure credentials
        run: s config add --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -a default -f

      - name: Deploy to FC
        env:
          DB_HOST: pgm-wz926p594292r913.rwlb.rds.aliyuncs.com
          DB_NAME: appliance_db
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: "5432"
          DB_USER: rwrwrw2224
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: s deploy -y --use-local

      - name: Configure VPC for FC
        run: |
          aliyun configure set --mode AK --region cn-shenzhen --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          aliyun fc UpdateFunction --functionName api --body '{"functionName":"api","vpcConfig":{"vpcId":"vpc-wz9panhs3lr4y30c8cd75","vswitchIds":["vsw-wz9x49y8clwt46f3086x7"],"securityGroupId":"sg-wz95y2xh9e7ajlongxaj"}}' --region cn-shenzhen
