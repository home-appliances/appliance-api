name: Deploy to FC

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          rm -rf dist/ tsconfig.tsbuildinfo
          npm ci
          npm run build
          # 创建 dist/package.json（不含 type:module，FC 用 require() 加载）
          node -e "
          const pkg = require('./package.json');
          const distPkg = { name: pkg.name, version: pkg.version, main: 'index.js', dependencies: pkg.dependencies || {} };
          require('fs').writeFileSync('dist/package.json', JSON.stringify(distPkg, null, 2));
          "
          cp package-lock.json dist/
          cd dist && npm install --omit=dev && cd ..
          echo "=== VERIFY ==="
          ls dist/node_modules/hono/package.json && echo "✅ hono exists"
          cat dist/package.json
          du -sh dist/
          echo "=== FILES ==="
          ls dist/*.js

      - name: Package code.zip
        run: |
          cd dist && zip -r ../code.zip . && cd ..
          echo "=== ZIP FILE ==="
          ls -la code.zip
          echo "=== ZIP SIZE ==="
          du -sh code.zip
          echo "=== ZIP TOP FILES ==="
          unzip -l code.zip | grep -E "fc-handler|index\.js" | head -5
          echo "=== ZIP VERIFY ==="
          test -f code.zip && echo "✅ code.zip exists" || echo "❌ code.zip missing!"

      - name: Deploy to FC via API
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
        run: |
          npm install @alicloud/fc2
          node -e "
          const FC = require('@alicloud/fc2');
          const fs = require('fs');

          const client = new FC(process.env.ALIYUN_ACCOUNT_ID, {
            accessKeyID: process.env.ALIYUN_ACCESS_KEY_ID,
            accessKeySecret: process.env.ALIYUN_ACCESS_KEY_SECRET,
            region: 'cn-shenzhen',
          });

          async function deploy() {
            const code = fs.readFileSync('code.zip');
            console.log('Uploading', code.length, 'bytes...');

            // 直接调用 PUT API，用 code.zipFile 传代码
            const result = await client.put(
              '/services/appliance-service/functions/applican',
              {
                handler: 'fc-handler.handler',
                timeout: 60,
                memorySize: 512,
                code: { zipFile: code.toString('base64') },
                environmentVariables: {
                  DB_HOST: 'pgm-wz97275grs6n7622.rwlb.rds.aliyuncs.com',
                  DB_NAME: 'appliance_db',
                  DB_PASSWORD: 'Aa_123789',
                  DB_PORT: '5432',
                  DB_USER: 'Aa_123',
                  NODE_ENV: 'production',
                  TZ: 'Asia/Shanghai',
                },
              }
            );
            console.log('✅ Deployed! codeSize:', result.data.codeSize, 'checksum:', result.data.codeChecksum);
          }
          deploy().catch(e => { console.error('❌', e.message); process.exit(1); });
          "
          sleep 10
          curl -s https://fc.cheapgo.top/
