<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appliance Admin - 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    /* 内联补丁：头像下拉菜单样式 */
    .user-dropdown { position: relative; }
    .user-dropdown-menu {
      position: absolute; top: 100%; right: 0; z-index: 200;
      min-width: 180px; padding: 4px; margin-top: 6px;
      background: var(--bg-card); border: 1px solid var(--gray-200);
      border-radius: var(--radius-md); box-shadow: var(--shadow-md);
      opacity: 0; visibility: hidden; transform: translateY(-4px);
      transition: all 0.15s ease;
    }
    .user-dropdown.open .user-dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .user-dropdown-header { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); }
    .user-dropdown-name { font-weight: 600; color: var(--gray-800); font-size: 14px; }
    .user-dropdown-email { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .user-dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; font-size: 13px; color: var(--gray-700);
      cursor: pointer; border-radius: 4px; border: none; background: none; width: 100%; text-align: left;
    }
    .user-dropdown-item:hover { background: var(--bg-hover); }
    .user-dropdown-item.danger { color: var(--danger); }
    .user-dropdown-divider { height: 1px; background: var(--gray-100); margin: 4px 0; }

    /* 通知面板 */
    .notification-panel {
      position: absolute; top: 100%; right: 0; z-index: 200;
      width: 340px; margin-top: 6px;
      background: var(--bg-card); border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
      opacity: 0; visibility: hidden; transform: translateY(-4px);
      transition: all 0.15s ease; max-height: 400px; display: flex; flex-direction: column;
    }
    .notification-wrapper.open .notification-panel { opacity: 1; visibility: visible; transform: translateY(0); }
    .notification-panel-header { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
    .notification-panel-title { font-weight: 600; font-size: 15px; color: var(--gray-800); }
    .notification-panel-body { overflow-y: auto; flex: 1; }
    .notification-item {
      display: flex; gap: 12px; padding: 12px 16px; cursor: pointer;
      transition: background 0.15s; border-bottom: 1px solid var(--gray-50);
    }
    .notification-item:hover { background: var(--bg-hover); }
    .notification-item.unread { background: rgba(26,35,126,0.02); }
    .notification-item-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
      flex-shrink: 0; margin-top: 6px;
    }
    .notification-item.read .notification-item-dot { background: var(--gray-300); }
    .notification-item-title { font-size: 13px; font-weight: 500; color: var(--gray-800); }
    .notification-item-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .notification-item-time { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

    /* 导入弹窗 */
    .import-preview-table { margin-top: 16px; overflow-x: auto; }
    .import-preview-table table { font-size: 12px; }
    .import-validation-error { color: var(--danger); font-size: 12px; margin-top: 8px; }

    /* 导出字段选择 */
    .export-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
    .export-field-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray-700); }
    .export-field-item input { accent-color: var(--primary); }

    /* 行内展开 */
    .detail-expand-row td { padding: 0 !important; }
    .detail-expand-content {
      padding: 16px 20px; background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
    }
    [data-theme="dark"] .detail-expand-content { background: var(--gray-100); border-color: var(--gray-200); }

    /* 密码强度 */
    .pwd-strength { display: flex; gap: 4px; margin-top: 6px; }
    .pwd-strength-bar { height: 3px; flex: 1; border-radius: 2px; background: var(--gray-200); transition: background 0.2s; }
    .pwd-strength-bar.active.weak { background: var(--danger); }
    .pwd-strength-bar.active.medium { background: var(--warning); }
    .pwd-strength-bar.active.strong { background: var(--success); }
    .pwd-strength-text { font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 确认弹窗 -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal modal-sm">
      <div class="modal-body" style="text-align:center; padding:32px 24px;">
        <div class="confirm-icon warning" id="confirmIcon">⚠</div>
        <div class="confirm-title" id="confirmTitle">确认操作</div>
        <div class="confirm-desc" id="confirmDesc">确定要执行此操作吗？</div>
        <div id="confirmInputWrapper" style="margin-top:16px;display:none;">
          <input type="text" class="form-input" id="confirmInput" placeholder="" style="text-align:center;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="confirmCancel">取消</button>
        <button class="btn btn-danger" id="confirmOk">确认</button>
      </div>
    </div>
  </div>

  <!-- 通用弹窗容器 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- 主布局 -->
  <div class="app-layout" id="appLayout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">A</div>
        <div class="sidebar-brand">Appliance</div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-collapse-btn" id="btnCollapseSidebar">
          <span id="collapseIcon">◀</span>
          <span>收起菜单</span>
        </button>
        <div class="sidebar-version">v1.0.0</div>
        <a class="sidebar-help" href="#">❓ <span>帮助文档</span></a>
      </div>
    </aside>

    <!-- 主区域 -->
    <div class="main-area">
      <!-- 顶部栏 -->
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb" id="breadcrumb"></div>
        </div>
        <div class="header-right">
          <!-- 暗色模式 -->
          <button class="header-btn" id="btnTheme" title="切换主题">🌙</button>
          <!-- 全屏 -->
          <button class="header-btn" id="btnFullscreen" title="全屏">⛶</button>
          <!-- 通知 -->
          <div class="notification-wrapper" id="notificationWrapper">
            <button class="header-btn" id="btnNotification" title="通知">
              🔔<span class="notification-dot" id="notifDot"></span>
            </button>
            <div class="notification-panel" id="notificationPanel"></div>
          </div>
          <!-- 用户 -->
          <div class="user-dropdown" id="userDropdown">
            <div class="header-user" id="btnUser">
              <div class="header-avatar" id="headerAvatar"></div>
              <div class="header-user-info">
                <div class="header-user-name" id="headerUserName"></div>
                <div class="header-user-role" id="headerUserRole"></div>
              </div>
            </div>
            <div class="user-dropdown-menu" id="userMenu">
              <div class="user-dropdown-header">
                <div class="user-dropdown-name" id="menuUserName"></div>
                <div class="user-dropdown-email" id="menuUserEmail"></div>
              </div>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item" data-action="profile">👤 个人资料</button>
              <button class="user-dropdown-item" data-action="password">🔒 修改密码</button>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item danger" data-action="logout">🚪 退出登录</button>
            </div>
          </div>
        </div>
      </header>

      <!-- 标签页栏 -->
      <div class="tabs-bar" id="tabsBar"></div>

      <!-- 内容区 -->
      <div class="page-content" id="pageContent"></div>
    </div>
  </div>

  <script src="js/api.js?v=5"></script>
  <script src="js/store.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
