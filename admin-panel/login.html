<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理系统 - 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/base.css?v=2">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; background: var(--gray-50); }

    .login-wrapper {
      display: flex; width: 100%; min-height: 100vh;
    }

    /* 左侧品牌区 */
    .login-brand {
      flex: 0 0 45%;
      background: linear-gradient(160deg, var(--primary-900) 0%, var(--primary-700) 50%, var(--primary-800) 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 60px; position: relative; overflow: hidden;
    }
    .login-brand::before {
      content: ''; position: absolute; top: -30%; right: -20%;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .login-brand::after {
      content: ''; position: absolute; bottom: -20%; left: -10%;
      width: 400px; height: 400px; border-radius: 50%;
      background: rgba(255,255,255,0.02);
    }
    .brand-content { text-align: center; position: relative; z-index: 1; max-width: 400px; }
    .brand-logo {
      width: 72px; height: 72px; border-radius: 16px;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 32px; color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .brand-name { font-family: var(--font-heading); font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 12px; letter-spacing: -0.5px; }
    .brand-slogan { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 48px; }
    .brand-features { text-align: left; }
    .brand-feature {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      color: rgba(255,255,255,0.8); font-size: 14px;
    }
    .brand-feature-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .brand-footer {
      position: absolute; bottom: 32px; left: 0; right: 0; text-align: center;
      color: rgba(255,255,255,0.4); font-size: 12px;
    }

    /* 右侧登录区 */
    .login-form-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px;
    }
    .login-card {
      width: 100%; max-width: 420px;
    }
    .login-title {
      font-family: var(--font-heading); font-size: 26px; font-weight: 700;
      color: var(--gray-900); margin-bottom: 6px;
    }
    .login-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 36px; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
    .form-input-wrapper { position: relative; }
    .form-input {
      width: 100%; padding: 10px 14px; padding-left: 40px;
      border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 14px; color: var(--gray-900); background: #fff;
      transition: all 0.2s; font-family: var(--font-body); box-sizing: border-box;
    }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,35,126,0.08); }
    .form-input.error { border-color: var(--danger); }
    .form-input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); font-size: 16px; pointer-events: none;
    }
    .form-input-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); cursor: pointer; font-size: 16px; background: none; border: none; padding: 4px;
    }
    .form-input-toggle:hover { color: var(--gray-600); }
    .form-error { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }
    .form-error.visible { display: block; animation: shake 0.4s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .form-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--gray-600); }
    .form-checkbox input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .form-link { font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 500; }
    .form-link:hover { text-decoration: underline; }

    .btn-login {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: var(--font-body);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--primary-700); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,35,126,0.3); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-login .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-error-msg {
      background: rgba(244,67,54,0.08); border: 1px solid rgba(244,67,54,0.2);
      border-radius: 8px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; color: var(--danger); display: none;
      animation: shake 0.4s ease;
    }
    .login-error-msg.visible { display: flex; align-items: center; gap: 8px; }

    .login-footer { text-align: center; margin-top: 32px; font-size: 13px; color: var(--gray-500); }
    .login-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }

    @media (max-width: 768px) {
      .login-brand { display: none; }
      .login-form-area { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- 左侧品牌区 -->
    <div class="login-brand">
      <div class="brand-content">
        <div class="brand-logo">⚙</div>
        <div class="brand-name">Appliance Admin</div>
        <div class="brand-slogan">高效、安全、智能的后台管理系统<br>让数据管理变得简单</div>
        <div class="brand-features">
          <div class="brand-feature">
            <div class="brand-feature-icon">🛡</div>
            <span>多层级权限控制，数据安全有保障</span>
          </div>
          <div class="brand-feature">
            <div class="brand-feature-icon">📊</div>
            <span>实时数据看板，业务状态一目了然</span>
          </div>
          <div class="brand-feature">
            <div class="brand-feature-icon">⚡</div>
            <span>高效数据操作，批量处理省时省力</span>
          </div>
        </div>
      </div>
      <div class="brand-footer">© 2026 Appliance Admin System. All rights reserved.</div>
    </div>

    <!-- 右侧登录区 -->
    <div class="login-form-area">
      <div class="login-card">
        <div class="login-title">欢迎回来</div>
        <div class="login-subtitle">请输入您的账号信息以继续</div>

        <div class="login-error-msg" id="loginError">
          <span>⚠</span>
          <span id="loginErrorText">账号或密码错误，请重试</span>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label class="form-label">账号</label>
            <div class="form-input-wrapper">
              <span class="form-input-icon">👤</span>
              <input type="text" class="form-input" id="loginAccount" placeholder="请输入邮箱或用户名">
            </div>
            <div class="form-error" id="accountError">请输入账号</div>
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="form-input-wrapper">
              <span class="form-input-icon">🔒</span>
              <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
              <button type="button" class="form-input-toggle" id="togglePassword" title="显示密码">👁</button>
            </div>
            <div class="form-error" id="passwordError">请输入密码</div>
          </div>

          <div class="form-row">
            <label class="form-checkbox">
              <input type="checkbox" checked> 记住我
            </label>
            <a href="#" class="form-link">忘记密码？</a>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="spinner"></span>
            <span class="btn-text">登 录</span>
          </button>
        </form>

        <div class="login-footer">
          遇到问题？<a href="#">联系管理员</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api/admin';

    // 密码显示/隐藏
    document.getElementById('togglePassword').addEventListener('click', function() {
      const pwd = document.getElementById('loginPassword');
      const isPassword = pwd.type === 'password';
      pwd.type = isPassword ? 'text' : 'password';
      this.textContent = isPassword ? '🙈' : '👁';
    });

    // 表单提交 - 对接真实 API
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const account = document.getElementById('loginAccount').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('btnLogin');
      const errorMsg = document.getElementById('loginError');
      const accountError = document.getElementById('accountError');
      const passwordError = document.getElementById('passwordError');

      // 清除错误
      errorMsg.classList.remove('visible');
      accountError.classList.remove('visible');
      passwordError.classList.remove('visible');
      document.getElementById('loginAccount').classList.remove('error');
      document.getElementById('loginPassword').classList.remove('error');

      let hasError = false;
      if (!account) { accountError.classList.add('visible'); document.getElementById('loginAccount').classList.add('error'); hasError = true; }
      if (!password) { passwordError.classList.add('visible'); document.getElementById('loginPassword').classList.add('error'); hasError = true; }
      if (hasError) return;

      // 加载状态
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const resp = await fetch(API_BASE + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: account, password })
        });
        const data = await resp.json();

        if (resp.ok && data.code === 0) {
          // 保存 token 和用户信息
          localStorage.setItem('admin_token', data.data.token);
          localStorage.setItem('currentUser', JSON.stringify(data.data.user));
          localStorage.setItem('isLoggedIn', 'true');
          window.location.href = 'index.html';
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
          document.getElementById('loginErrorText').textContent = data.message || '登录失败，请重试';
          errorMsg.classList.add('visible');
        }
      } catch (err) {
        btn.classList.remove('loading');
        btn.disabled = false;
        document.getElementById('loginErrorText').textContent = '无法连接服务器，请确认后端已启动';
        errorMsg.classList.add('visible');
      }
    });

    // 已登录则直接跳转
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
