edition: 3.0.0
name: appliance-api
access: default

vars:
  region: cn-shenzhen

resources:
  api:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: appliance
      functionName: api
      description: '家电搜索 Hono 后端 API (Node.js 20 + PostgreSQL)'
      runtime: nodejs20
      handler: fc-handler.handler
      code: ./code.zip
      memorySize: 512
      timeout: 60
      logConfig:
        enableInstanceMetrics: false
        enableRequestMetrics: false
      # vpcConfig:  # VPC 通过 aliyun CLI 单独管理，Serverless-Devs 有 bug
      environmentVariables:
        DB_HOST: ${env('DB_HOST')}
        DB_NAME: ${env('DB_NAME')}
        DB_PASSWORD: ${env('DB_PASSWORD')}
        DB_PORT: ${env('DB_PORT')}
        DB_USER: ${env('DB_USER')}
        JWT_SECRET: ${env('JWT_SECRET')}
        ALIYUN_ACCESS_KEY_ID: ${env('ALIYUN_ACCESS_KEY_ID')}
        ALIYUN_ACCESS_KEY_SECRET: ${env('ALIYUN_ACCESS_KEY_SECRET')}
        CDN_DOMAIN: ${env('CDN_DOMAIN')}
        NODE_ENV: production
        TZ: Asia/Shanghai
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
