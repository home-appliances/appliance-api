edition: 3.0.0
name: appliance-api
access: default

vars:
  region: cn-shenzhen

resources:
  applican:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: appliance-service
      functionName: applican
      runtime: nodejs20
      handler: fc-handler.handler
      code: ./code.zip
      memorySize: 512
      timeout: 60
      environmentVariables:
        DB_HOST: ${env('DB_HOST')}
        DB_NAME: ${env('DB_NAME')}
        DB_PASSWORD: ${env('DB_PASSWORD')}
        DB_PORT: ${env('DB_PORT')}
        DB_USER: ${env('DB_USER')}
        NODE_ENV: production
        TZ: Asia/Shanghai
